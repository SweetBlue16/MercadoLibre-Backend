name: SonarQube Cloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze-nodejs-backend:
    name: Analyze Node.js API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # - name: Run tests with coverage
      #   run: npm run test -- --coverage

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@49e6cd3b187936a73b8280d59faa9b3eb1cc5720
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ioexception-team_mercadolibre-backend
            -Dsonar.organization=ioexception-team
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,coverage/**,**/*.test.js,swagger-output.json,seeders/**,migrations/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
